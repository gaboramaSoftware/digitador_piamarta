<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Digitador Piamarta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2A3B85;
            --primary-dark: #13246d;
            --secondary: #10b981;
            --danger: #ef4444;
            --bg-dark: #f3f4f6;
            --bg-card: #ffffff;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #002877;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: var(--primary);
            font-size: 1.75rem;
            font-weight: 700;
        }

        .login-header span {
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(42, 59, 133, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background-color 0.2s;
        }

        .btn-login:hover { background-color: var(--primary-dark); }

        .error-msg {
            display: none;
            background-color: #fee2e2;
            color: var(--danger);
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .error-msg.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>Digitador</h1>
            <span>Panel de Administración — Piamarta</span>
        </div>

        <div class="error-msg" id="error-msg">RUT o contraseña incorrectos.</div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="rut">RUT (sin puntos ni guión)</label>
                <input type="text" id="rut" placeholder="Ej: 12345678K" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Ingresar</button>
        </form>
    </div>

    <script src="auth.js"></script>
    <script>
        if (sessionStorage.getItem('digitador_auth') === 'true') {
            window.location.href = 'index.html';
        }

        function handleLogin(e) {
            e.preventDefault();
            const rut = document.getElementById('rut').value.trim().toUpperCase();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (verificarCredenciales(rut, password)) {
                sessionStorage.setItem('digitador_auth', 'true');
                window.location.href = 'index.html';
            } else {
                errorMsg.classList.add('visible');
                document.getElementById('password').value = '';
            }
        }
    </script>
</body>
</html>
